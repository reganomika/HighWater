<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>HighWater</title>
  <desc>A rising wave just touching a dashed high-water mark line, next to the two-tone HighWater wordmark: High in amber matching the mark line, Water in blue matching the wave.</desc>
  <defs>
    <linearGradient id="wave" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1B6E8C"/>
      <stop offset="100%" stop-color="#5FB8D6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="680" height="200" rx="16" fill="#14232E"/>

  <line x1="34" y1="66" x2="228" y2="66" stroke="#E3B23C" stroke-width="3" stroke-dasharray="7,5"/>
  <line x1="34" y1="58" x2="34" y2="74" stroke="#E3B23C" stroke-width="3"/>
  <line x1="228" y1="58" x2="228" y2="74" stroke="#E3B23C" stroke-width="3"/>

  <path d="M34,170 L34,120 C58,96 82,140 106,116 C130,92 154,136 178,112 C196,96 212,104 228,96 L228,170 Z" fill="url(#wave)"/>

  <text x="270" y="120" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700"><tspan fill="#E8B84C">High</tspan><tspan fill="#5FB8D6">Water</tspan></text>
</svg>
